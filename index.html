<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/jpeg" href="https://qtrypzzcjebvfcihiynt.supabase.co/storage/v1/object/public/base44-prod/public/69349b30698117be30e537d8/150f88291_IMAGE2025-12-29223816.jpg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="manifest" href="/manifest.json" />
    <title>TAP — Trading Analytics Pro</title>
  </head>
  <body>
    <div id="root">
      <div id="tap-splash" style="position:fixed;inset:0;background:#080808;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity 0.4s ease;">
        <div style="width:48px;height:48px;border-radius:50%;border:2px solid rgba(16,185,129,0.15);border-top-color:#10b981;animation:tap-spin 0.8s linear infinite;margin-bottom:16px;"></div>
        <div style="color:#10b981;font-size:11px;letter-spacing:0.15em;font-family:system-ui,sans-serif;font-weight:500;opacity:0.7;">TAP</div>
      </div>
    </div>
    <style>@keyframes tap-spin{to{transform:rotate(360deg)}}</style>
    <script>
      window.addEventListener('load', function() {
        var splash = document.getElementById('tap-splash');
        if (splash) { splash.style.opacity = '0'; setTimeout(function(){ splash.remove(); }, 400); }
      });
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
